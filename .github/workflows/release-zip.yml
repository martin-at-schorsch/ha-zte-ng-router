      - name: Build zip (root files, no folder)
        run: |
          set -euxo pipefail
          DOMAIN="zte_ng_router"
          ZIP_NAME="${DOMAIN}.zip"

          rm -f "${ZIP_NAME}"
          rm -rf dist
          mkdir -p dist

          # Kopiere NUR den Inhalt von custom_components/<domain>/ in dist/ (ohne den Ordner selbst)
          cp -a "custom_components/${DOMAIN}/." "dist/"

          # ZIP soll Root-Files enthalten
          (cd dist && zip -r "../${ZIP_NAME}" . \
            -x "**/__pycache__/**" "**/*.pyc" "**/.DS_Store")

          # Check: manifest liegt im ZIP-Root
          unzip -l "${ZIP_NAME}" | head -n 50
          unzip -l "${ZIP_NAME}" | grep -q "^ *[0-9].*manifest.json$"
